# route_source_map.yaml
# WEB-CAT-INTEGRATION-01 — Explicit Source Authority Mapping
# Contract: WEB-CAT-INTEGRATION-01 / 2026-03-31
#
# Principle: No route may be compiled without explicit source authority.
#            WEB enforces CAT; WEB does not define CAT.
#
# Authority classes:
#   canonical_kpi           — source is a k-pi governance document
#   cat_governed_derivative — source is a k-pi derivative node/narrative
#   base44_snapshot_fallback — source is rendered Base44 capture
#   compiled_trusted_legacy — source is pages/ file with no upstream k-pi authority
#   invalid_unmapped        — route exists but has no declared source (blocked)
#
# Verdict values:
#   allowed     — all required checks pass; may compile
#   provisional — compiles but requires manual acknowledgment of fallback status
#   blocked     — must not compile; missing required authority
#
# CAT artifacts (k-pi/docs/governance/category/):
#   construct_positioning_map.md | claim_boundary_model.md | projection_schema.md
#   projection_readiness_gate.md | category_structure_model.md | domain_mapping_model.md

